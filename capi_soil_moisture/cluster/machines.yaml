# ==========================================
# Pi 1 (Master / Control Plane)
# ==========================================
apiVersion: cluster.x-k8s.io/v1beta1
kind: Machine
metadata:
  name: pi-1
  namespace: default
spec:
  clusterName: pi-cluster
  version: v1.30.0+k0s.0
  bootstrap:
    configRef:
      apiVersion: bootstrap.cluster.x-k8s.io/v1beta1
      kind: K0sWorkerConfig  # Or K0sControlPlaneConfig depending on your setup
      name: pi-1-config
  infrastructureRef:
    apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
    kind: RemoteMachine
    name: pi-1-infra
---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
kind: RemoteMachine
metadata:
  name: pi-1-infra
  namespace: default
spec:
  address: 192.168.0.204
  port: 22
  user: pi1
  useSudo: true
  sshKeyRef:
    name: pi-ssh-key
---
apiVersion: bootstrap.cluster.x-k8s.io/v1beta1
kind: K0sWorkerConfig
metadata:
  name: pi-1-config
  namespace: default
spec:
  version: v1.30.0+k0s.0

