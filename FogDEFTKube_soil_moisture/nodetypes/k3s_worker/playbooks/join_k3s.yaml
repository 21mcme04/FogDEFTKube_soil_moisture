---
- name: Add worker to inventory
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Add worker host to inventory
      add_host:
        name: "{{ worker_ip }}"
        ansible_host: "{{ worker_ip }}"
        ansible_user: "{{ worker_user_name }}"
        groups: k3s_worker

- name: Join K3s worker node to the cluster
  hosts: k3s_worker
  gather_facts: false
  become: true
  tasks:
    - name: Debug input variables
      debug:
        msg:
          - "Worker IP: {{ worker_ip }}"
          - "Manager IP: {{ manager_ip }}"
          - "Join token available: {{ 'YES' if k3s_join_token is defined else 'NO' }}"

    - name: Check if K3s agent is already running
      shell: systemctl is-active k3s-agent
      register: k3s_status
      ignore_errors: true
      changed_when: false

    - name: Debug K3s agent status
      debug:
        msg: "K3s agent status: {{ k3s_status.stdout | default('not found') }}"

    - name: Enable cgroup memory (required for K3s on Raspberry Pi)
      lineinfile:
        path: /boot/firmware/cmdline.txt
        regexp: '^((?:(?!.*\bcgroup_enable=memory\b)(?!.*\bcgroup_memory=1\b)(?!.*\bswapaccount=1\b).)*?)(\s+)?$'
        line: '\1 cgroup_enable=memory cgroup_memory=1 swapaccount=1'
        backrefs: yes
      register: cmdline_modified
      when: k3s_status.stdout != "active"

    - name: Reboot if needed
      reboot:
        reboot_timeout: 300
      when: cmdline_modified is defined and cmdline_modified.changed

    - name: Install Docker
      apt:
        name: docker.io
        state: present
        update_cache: yes
      when: k3s_status.stdout != "active"
      ignore_errors: true

    - name: Start Docker
      systemd:
        name: docker
        state: started
        enabled: true
      ignore_errors: true

    - name: Join K3s cluster as worker
      shell: |
        curl -sfL https://get.k3s.io | K3S_URL="https://{{ manager_ip }}:6443" K3S_TOKEN="{{ k3s_join_token }}" INSTALL_K3S_EXEC="--docker" sh -
      when: k3s_status.stdout != "active"
      register: join_result
      environment:
        K3S_URL: "https://{{ manager_ip }}:6443"
        K3S_TOKEN: "{{ k3s_join_token }}"
        INSTALL_K3S_EXEC: "--docker"

    - name: Wait for K3s agent to be ready
      wait_for:
        port: 10250
        host: "{{ ansible_host }}"
        delay: 10
        timeout: 60
      when: k3s_status.stdout != "active"

    - name: Final status
      debug:
        msg:
          - "Worker node {{ ansible_host }} status"
          - "K3s agent: {{ k3s_status.stdout | default('unknown') }}"
          - "Join needed: {{ 'NO' if k3s_status.stdout == 'active' else 'YES' }}"
      when: join_result is defined
