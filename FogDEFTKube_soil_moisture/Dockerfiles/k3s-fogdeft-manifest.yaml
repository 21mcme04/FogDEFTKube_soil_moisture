# k3s-fogdeft-manifest.yaml
apiVersion: v1
kind: Namespace
metadata:
  name: fogdeft-stack
---
# MQTT Broker Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mqtt-broker
  namespace: fogdeft-stack
  labels:
    app: mqtt-broker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mqtt-broker
  template:
    metadata:
      labels:
        app: mqtt-broker
    spec:
    #   nodeSelector:
    #     node-role.kubernetes.io/master: "true"  # Equivalent to node.role == manager
      containers:
      - name: mqtt-broker
        image: saat123/fogdeft-mosquitto:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 1883
          name: mqtt
        volumeMounts:
        - name: mosquitto-data
          mountPath: /mosquitto/data
        - name: mosquitto-logs
          mountPath: /mosquitto/log
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
      volumes:
      - name: mosquitto-data
        persistentVolumeClaim:
          claimName: mosquitto-data-pvc
      - name: mosquitto-logs
        persistentVolumeClaim:
          claimName: mosquitto-logs-pvc
---
# MQTT Broker Service
apiVersion: v1
kind: Service
metadata:
  name: mqtt-broker
  namespace: fogdeft-stack
  labels:
    app: mqtt-broker
spec:
  selector:
    app: mqtt-broker
  ports:
  - port: 1883
    targetPort: 1883
    protocol: TCP
    name: mqtt
  type: ClusterIP  # Internal service discovery
---
# MQTT Broker NodePort Service (for external access)
apiVersion: v1
kind: Service
metadata:
  name: mqtt-broker-external
  namespace: fogdeft-stack
  labels:
    app: mqtt-broker
spec:
  selector:
    app: mqtt-broker
  ports:
  - port: 1883
    targetPort: 1883
    nodePort: 31883
    protocol: TCP
    name: mqtt
  type: NodePort
---
# MQTT Subscriber Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mqtt-subscriber
  namespace: fogdeft-stack
  labels:
    app: mqtt-subscriber
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mqtt-subscriber
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: mqtt-subscriber
    spec:
      # nodeSelector:
      #   node-role.kubernetes.io/worker: "true"  # Equivalent to node.role == worker
      containers:
      - name: mqtt-subscriber
        image: saat123/fogdeft-soil-subscriber:latest
        imagePullPolicy: Always  # Equivalent to pull_policy: always
        env:
        - name: MQTT_BROKER
          value: "mqtt-broker"  # Uses K3s DNS resolution
        - name: MQTT_PORT
          value: "1883"
        - name: MQTT_TOPIC
          value: "sensor/data"
        - name: LOG_LEVEL
          value: "INFO"
        resources:
          requests:
            memory: "32Mi"
            cpu: "25m"
          limits:
            memory: "64Mi"
            cpu: "50m"
        livenessProbe:
          exec:
            command:
            - pgrep
            - python
          initialDelaySeconds: 30
          periodSeconds: 30
        readinessProbe:
          exec:
            command:
            - pgrep
            - python
          initialDelaySeconds: 5
          periodSeconds: 10
      restartPolicy: Always
---
# PersistentVolumeClaim for mosquitto data
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mosquitto-data-pvc
  namespace: fogdeft-stack
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  storageClassName: local-path  # K3s default storage class
---
# PersistentVolumeClaim for mosquitto logs
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mosquitto-logs-pvc
  namespace: fogdeft-stack
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 500Mi
  storageClassName: local-path  # K3s default storage class